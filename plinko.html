.btn-icon-only { width: 42px; height: 42px; border-radius: 12px; background: var(--ios-input); border: 1px solid var(--chip-border); box-shadow: var(--glass-highlight), var(--shadow-sm); display: flex; align-items: center; justify-content: center; color: var(--ios-text); cursor: pointer; backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); transition: transform 0.2s; text-decoration: none; }

.target-card { background: var(--ios-card); backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); box-shadow: var(--shadow-md), var(--glass-highlight); border-radius: 20px; padding: 12px 24px; text-align: center; width: 100%; pointer-events: auto; }

/* Auth Overlay */

<script>
/* ========================================================================
   PLINKO PHYSICS ENGINE & GAME LOGIC
======================================================================== */

// 1. Vector Math
const v = (x, y) => ({ x, y });
const add = (a, b) => ({ x: a.x + b.x, y: a.y + b.y });
const sub = (a, b) => ({ x: a.x - b.x, y: a.y - b.y });
const scale = (a, s) => ({ x: a.x * s, y: a.y * s });
const dot = (a, b) => a.x * b.x + a.y * b.y;
const len = (a) => Math.hypot(a.x, a.y);
const clamp = (val, lo, hi) => Math.max(lo, Math.min(hi, val));

// 2. Constants
const GRAVITY = 2200; 
const RESTITUTION = 0.7; 
const TANGENT_KEEP = 0.98; 
const MAX_SUBSTEPS = 16; 
const FIXED_DT = 1 / 60;
const BALL_RADIUS = 10;
const MAX_BALLS = 150;
const REST_RADIUS = 4, REST_TIME = 0.18, REST_MARGIN = 4, REST_FLATNESS = 0.7;
const SLOT_WIDTH = 24, RAIL_HEIGHT = 48, LETTER_DROP = 12;
const CANNON_BASE_RATIO = 0.5, CANNON_LENGTH_RATIO = 0.7, CANNON_WIDTH_RATIO = 0.34, MAX_AIM = Math.PI / 4, LAUNCH_SPEED = 720;
const STAGE_MAX_WIDTH = 2560;

const getThemeColor = () => {
    const isDk = document.body.getAttribute('data-theme') === 'dark';
    return {
        dome: isDk ? '#333' : '#FFF',
        text: isDk ? '#FFF' : '#1D1D1F',
        ball: isDk ? '#A1C4FD' : '#007AFF', 
        glow: '74, 222, 128',
        guideline: '255, 70, 70',
        pegLine: isDk ? 'rgba(255,255,255,0.3)' : 'rgba(0,0,0,0.2)'
    };
};

// 3. State & Mode Toggle
let isHardMode = true; 
let activeChars = "012345";
let CODE_LENGTH = 6;
let OBSTACLE_RADIUS_RATIO = 0.15;

window.toggleMode = () => {
    isHardMode = !isHardMode;
    const btn = document.getElementById('modeToggleBtn');
    btn.innerText = isHardMode ? "HARD" : "EASY";
    btn.style.color = isHardMode ? "#FF3B30" : "#34C759";
    btn.style.borderColor = isHardMode ? "#FF3B30" : "#34C759";
    
    // Easy mode: 4 target cups, no pegs. Hard mode: 6 cups, with pegs.
    activeChars = isHardMode ? "012345" : "0123";
    CODE_LENGTH = activeChars.length;
    OBSTACLE_RADIUS_RATIO = isHardMode ? 0.15 : 0;
    
    const hL = document.getElementById('handleL'), hR = document.getElementById('handleR');
    hL.style.opacity = isHardMode ? "1" : "0";
    hR.style.opacity = isHardMode ? "1" : "0";
    hL.style.pointerEvents = isHardMode ? "auto" : "none";
    hR.style.pointerEvents = isHardMode ? "auto" : "none";

    window.resetGame();
};

let game = { target: '', entered: [], dropped: 0, status: 'playing' };
let balls = [];
let slotOf = new Map();
let freedSlots = [];
let placedCount = 0;
let world = null;
let apparatus = { x: 0, angle: 0, panning: false };
let pegs = { y: 0, min: 0, max: 0, dragging: false };
let hoverSlot = -1;

const isTouch = window.matchMedia("(pointer: coarse)").matches;
const FIRE_BAR_HEIGHT = isTouch ? 80 : 0;
if(isTouch) document.getElementById('fireBar').classList.add('show');

// 4. Collision & Physics
const closestOnSegment = (p, s) => {
    const ab = sub(s.b, s.a);
    const denom = dot(ab, ab);
    const t = denom === 0 ? 0 : clamp(dot(sub(p, s.a), ab) / denom, 0, 1);
    return add(s.a, scale(ab, t));
};
const hitSegment = (ball, s) => {
    const offset = sub(ball.pos, closestOnSegment(ball.pos, s));
    const dist = len(offset);
    if (dist === 0 || dist > ball.radius) return null;
    return { normal: scale(offset, 1 / dist), depth: ball.radius - dist };
};
const hitDome = (ball, dome) => {
    if (ball.pos.y > dome.center.y) return null;
    const offset = sub(ball.pos, dome.center);
    const dist = len(offset);
    const reach = dome.radius + ball.radius;
    if (dist === 0 || dist > reach) return null;
    return { normal: scale(offset, 1 / dist), depth: reach - dist };
};
const hitObstacle = (ball, o) => {
    const offset = sub(ball.pos, o.center);
    const dist = len(offset);
    const reach = o.radius + ball.radius;
    if (dist === 0 || dist > reach) return null;
    return { normal: scale(offset, 1 / dist), depth: reach - dist };
};
const resolveHit = (ball, hit) => {
    ball.pos = add(ball.pos, scale(hit.normal, hit.depth));
    const into = dot(ball.vel, hit.normal);
    if (into >= 0) return;
    const normal = scale(hit.normal, into);
    const tangent = sub(ball.vel, normal);
    ball.vel = sub(scale(tangent, TANGENT_KEEP), scale(normal, RESTITUTION));
};

const collide = (ball, w) => {
    for (const s of w.segments) { const hit = hitSegment(ball, s); if (hit) resolveHit(ball, hit); }
    for (const d of w.domes) { const hit = hitDome(ball, d); if (hit) resolveHit(ball, hit); }
};
const collideObstacles = (ball, w, obsVel) => {
    for (const o of w.obstacles) {
        const hit = hitObstacle(ball, o);
        if (!hit) continue;
        ball.pos = add(ball.pos, scale(hit.normal, hit.depth));
        const rel = sub(ball.vel, obsVel);
        const into = dot(rel, hit.normal);
        if (into >= 0) continue;
        const normalComp = scale(hit.normal, into);
        const tangent = sub(rel, normalComp);
        const bounced = sub(scale(tangent, TANGENT_KEEP), scale(normalComp, RESTITUTION));
        ball.vel = add(bounced, obsVel);
    }
};
const collidePair = (a, b) => {
    if (a.resting && b.resting) return;
    const delta = sub(b.pos, a.pos);
    const dist = len(delta);
    const minDist = a.radius + b.radius;
    if (dist === 0 || dist >= minDist) return;
    const normal = scale(delta, 1 / dist);
    const overlap = minDist - dist;
    if (a.resting) { resolveHit(b, { normal, depth: overlap }); } 
    else if (b.resting) { resolveHit(a, { normal: scale(normal, -1), depth: overlap }); } 
    else {
        const shift = scale(normal, overlap / 2);
        a.pos = sub(a.pos, shift); b.pos = add(b.pos, shift);
        const approach = dot(sub(a.vel, b.vel), normal);
        if (approach > 0) {
            const impulse = scale(normal, ((1 + RESTITUTION) / 2) * approach);
            a.vel = sub(a.vel, impulse); b.vel = add(b.vel, impulse);
        }
    }
};

const onFlatSupport = (ball, w, blockers) => {
    const reach = ball.radius + REST_MARGIN;
    const upward = (offset, dist) => dist > 0 && -offset.y / dist >= REST_FLATNESS;
    for (const s of w.segments) {
        const offset = sub(ball.pos, closestOnSegment(ball.pos, s));
        const dist = len(offset);
        if (dist <= reach && upward(offset, dist)) return true;
    }
    for (const other of balls) {
        if (other === ball || !other.resting) continue;
        const offset = sub(ball.pos, other.pos);
        const dist = len(offset);
        if (dist - other.radius <= reach && upward(offset, dist)) return true;
    }
    for (const o of blockers) {
        const offset = sub(ball.pos, o.center);
        const dist = len(offset);
        if (dist - o.radius <= reach && upward(offset, dist)) return true;
    }
    return false;
};

const tryRest = (ball, w, dt, blockers) => {
    if (len(sub(ball.pos, ball.anchor)) > REST_RADIUS) {
        ball.anchor = ball.pos; ball.stillTime = 0;
    } else {
        ball.stillTime += dt;
        if (ball.stillTime >= REST_TIME && onFlatSupport(ball, w, blockers)) {
            ball.resting = true; ball.vel = v(0, 0);
        }
    }
};

const integrate = (ball, dt) => {
    ball.vel = add(ball.vel, v(0, GRAVITY * dt));
    ball.pos = add(ball.pos, scale(ball.vel, dt));
};

const stepAll = (simBalls, w, dt, pegFromY, pegToY, settle = true, blockers = []) => {
    if (dt === 0) return;
    let maxSpeed = 0;
    for (const b of simBalls) { if (!b.resting) maxSpeed = Math.max(maxSpeed, len(b.vel)); }
    const maxTravel = Math.max(maxSpeed * dt, Math.abs(pegToY - pegFromY));
    const substeps = clamp(Math.ceil(maxTravel / (BALL_RADIUS * 0.5)), 1, MAX_SUBSTEPS);
    const h = dt / substeps;
    const obsVel = v(0, (pegToY - pegFromY) / dt);

    for (let i = 0; i < substeps; i++) {
        const pegY = pegFromY + (pegToY - pegFromY) * ((i + 1) / substeps);
        for (const o of w.obstacles) o.center.y = pegY;
        for (const b of simBalls) {
            if (b.resting) continue;
            integrate(b, h);
            collide(b, w);
            collideObstacles(b, w, obsVel);
            for (const o of blockers) { const hit = hitObstacle(b, o); if (hit) resolveHit(b, hit); }
        }
        for (let j = 0; j < simBalls.length; j++) {
            for (let k = j + 1; k < simBalls.length; k++) { collidePair(simBalls[j], simBalls[k]); }
        }
    }
    if (settle) {
        for (const b of simBalls) { if (!b.resting) tryRest(b, w, dt, blockers); }
    }
};

// 5. Prediction
const touchingAnything = (ball, w) => {
    for (const s of w.segments) if (hitSegment(ball, s)) return true;
    for (const d of w.domes) if (hitDome(ball, d)) return true;
    for (const o of w.obstacles) if (hitObstacle(ball, o)) return true;
    return false;
};
const predictPath = (w, x, y, vx, vy, maxBounces, blockers) => {
    const ball = { pos: v(x, y), vel: v(vx, vy), radius: BALL_RADIUS, resting: false };
    const cw = blockers.length ? { ...w, obstacles: [...w.obstacles, ...blockers] } : w;
    const path = [v(x, y)];
    const dt = FIXED_DT;
    let bounces = 0, inContact = false;

    for (let step = 0; step < 240 && bounces < maxBounces; step++) {
        const substeps = clamp(Math.ceil((len(ball.vel) * dt) / (BALL_RADIUS * 0.5)), 1, MAX_SUBSTEPS);
        const h = dt / substeps;
        for (let i = 0; i < substeps && bounces < maxBounces; i++) {
            integrate(ball, h);
            const contact = touchingAnything(ball, cw);
            if (contact && !inContact) bounces += 1;
            inContact = contact;
            collide(ball, cw);
            collideObstacles(ball, cw, v(0, 0));
            path.push(v(ball.pos.x, ball.pos.y));
        }
        if (ball.pos.y > cw.height || ball.pos.x < 0 || ball.pos.x > cw.width) break;
    }
    return path;
};
const predictLanding = (w, x, y, vx, vy, blockers) => {
    const ghost = { pos: v(x, y), vel: v(vx, vy), radius: BALL_RADIUS, resting: false, anchor: v(x,y), stillTime: 0 };
    const ghosts = [ghost];
    const pegY = w.obstacles.length ? w.obstacles[0].center.y : 0;
    for (let step = 0; step < 600; step++) {
        stepAll(ghosts, w, FIXED_DT, pegY, pegY, true, blockers);
        if (ghost.resting) return clamp(Math.floor(ghost.pos.x / w.cupWidth), 0, w.cups.length - 1);
    }
    return null;
};

// 6. World Generation & Cannon
const randomCode = () => Array.from({length: CODE_LENGTH}, () => activeChars[Math.floor(Math.random() * CODE_LENGTH)]).join('');

const initGame = () => {
    game.target = randomCode();
    game.entered = Array(CODE_LENGTH).fill("");
    game.dropped = 0;
    game.status = 'playing';
    balls = [];
    slotOf.clear();
    freedSlots = [];
    placedCount = 0;
    if(window.resizeApp) window.resizeApp();
    updateUI();
};

const createWorld = (width, height) => {
    const cupWidth = width / CODE_LENGTH;
    const slotW = Math.min(SLOT_WIDTH, cupWidth * 0.6);
    const domeRad = Math.max((cupWidth - slotW) / 2, 0);
    const letterY = height - domeRad - LETTER_DROP;
    const obsRad = domeRad * OBSTACLE_RADIUS_RATIO;
    const obsY = letterY - domeRad;

    const segments = [
        { a: v(0, 0), b: v(0, height) },
        { a: v(width, 0), b: v(width, height) },
        { a: v(0, height), b: v(width, height) }
    ];
    let domes = [], obstacles = [], cups = [];
    for (let i = 0; i <= CODE_LENGTH; i++) domes.push({ center: v(i * cupWidth, height), radius: domeRad });
    for (let i = 0; i < CODE_LENGTH; i++) {
        const cx = (i + 0.5) * cupWidth;
        cups.push({ centerX: cx, letter: activeChars[i] });
        if (obsRad > 0) obstacles.push({ center: v(cx, obsY), radius: obsRad });
    }
    return { width, height, cupWidth, domeRadius: domeRad, letterY, segments, domes, obstacles, cups };
};

const cannonLength = (cupW) => cupW * CANNON_LENGTH_RATIO;
const aimAngleCalc = (px, py, pxBase) => clamp(Math.atan2(px - pxBase, Math.max(py, 0)), -MAX_AIM, MAX_AIM);
const muzzlePos = (pxBase, cupW, ang) => {
    const len = cannonLength(cupW);
    return v(pxBase + Math.sin(ang) * len, Math.cos(ang) * len);
};
const launchVel = (ang) => v(Math.sin(ang) * LAUNCH_SPEED, Math.cos(ang) * LAUNCH_SPEED);

// 7. Interaction Logic
const nextSlot = () => freedSlots.length ? freedSlots[freedSlots.length - 1] : (placedCount < CODE_LENGTH ? placedCount : null);
const addBall = (b) => {
    const slot = nextSlot();
    if (slot === null) return null;
    if (freedSlots.length) freedSlots.pop(); else placedCount++;
    balls.push(b);
    slotOf.set(b, slot);
    return slot;
};
const removeBall = (b) => {
    if (!b.resting) return false;
    const slot = slotOf.get(b);
    if (slot === undefined) return false;
    balls.splice(balls.indexOf(b), 1);
    slotOf.delete(b);
    if (balls.length === 0) { freedSlots = []; placedCount = 0; }
    else { freedSlots.push(slot); for(const ball of balls) ball.resting = false; }
    return true;
};
const fireCannon = () => {
    if (game.status !== 'playing') return;
    const m = muzzlePos(apparatus.x, world.cupWidth, apparatus.angle);
    const vel = launchVel(apparatus.angle);
    addBall({ pos: v(m.x, m.y), vel: v(vel.x, vel.y), radius: BALL_RADIUS, resting: false, anchor: v(m.x, m.y), stillTime: 0 });
};

// Controls
let isAiming = false, isPanning = false, stageOffsetPx = 0, stageWidth = 0;
const cvs = document.getElementById('gameCanvas');
const ctx = cvs.getContext('2d');

window.resizeApp = () => {
    const iw = window.innerWidth;
    stageWidth = Math.min(iw, STAGE_MAX_WIDTH);
    stageOffsetPx = (iw - stageWidth) / 2;
    const h = window.innerHeight - FIRE_BAR_HEIGHT;
    const dpr = window.devicePixelRatio || 1;
    cvs.width = stageWidth * dpr; cvs.height = h * dpr;
    cvs.style.width = `${stageWidth}px`; cvs.style.height = `${h}px`;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    world = createWorld(stageWidth, h);
    const margin = world.cupWidth * CANNON_BASE_RATIO;
    apparatus.x = apparatus.x === 0 ? stageWidth / 2 : clamp(apparatus.x, margin, stageWidth - margin);

    const reach = cannonLength(world.cupWidth);
    pegs.min = world.letterY - world.domeRadius;
    pegs.max = Math.min(reach + world.domeRadius + LETTER_DROP * 2, pegs.min);
    if (pegs.y === 0 || pegs.y > pegs.min) pegs.y = pegs.min;
    
    // Position drag handles
    const lH = document.getElementById('handleL'), rH = document.getElementById('handleR');
    lH.style.left = `${stageOffsetPx}px`; lH.style.top = `${pegs.y + (FIRE_BAR_HEIGHT===0?0:FIRE_BAR_HEIGHT/2)}px`;
    rH.style.left = `${stageOffsetPx + stageWidth - 12}px`; rH.style.top = `${pegs.y + (FIRE_BAR_HEIGHT===0?0:FIRE_BAR_HEIGHT/2)}px`;

    for (const b of balls) {
        b.pos.x = clamp(b.pos.x, b.radius, stageWidth - b.radius);
        b.pos.y = clamp(b.pos.y, b.radius, h - b.radius);
        b.resting = false;
    }
};

const stX = (cx) => cx - stageOffsetPx;
const getHitBall = (x, y, slop = 2) => {
    for (let k = balls.length - 1; k >= 0; k--) {
        const b = balls[k];
        if (b.resting && Math.hypot(b.pos.x - x, b.pos.y - y) <= b.radius + slop) return b;
    }
    return null;
};

// Cannon & Peg Interaction
cvs.addEventListener('pointerdown', e => {
    if (game.status !== 'playing') return;
    const sx = stX(e.clientX);
    const slop = e.pointerType === 'touch' ? 16 : 2;
    const hit = getHitBall(sx, e.clientY, slop);
    if (hit) { removeBall(hit); hoverSlot = -1; return; }
    isAiming = true; hoverSlot = -1;
    apparatus.angle = aimAngleCalc(sx, e.clientY, apparatus.x);
});
window.addEventListener('pointermove', e => {
    if (pegs.dragging && isHardMode) {
        pegs.y = clamp(e.clientY, pegs.max, pegs.min);
        const lH = document.getElementById('handleL'), rH = document.getElementById('handleR');
        lH.style.top = `${pegs.y}px`; rH.style.top = `${pegs.y}px`;
        return;
    }
    const sx = stX(e.clientX);
    if (isAiming) { apparatus.angle = aimAngleCalc(sx, e.clientY, apparatus.x); return; }
    if (e.pointerType !== 'mouse') return;
    if (game.status === 'playing') {
        const hit = getHitBall(sx, e.clientY);
        hoverSlot = hit ? slotOf.get(hit) : -1;
        cvs.style.cursor = hit ? 'pointer' : '';
    }
    const margin = world.cupWidth * CANNON_BASE_RATIO;
    apparatus.x = clamp(sx, margin, stageWidth - margin);
    apparatus.angle = 0;
});
window.addEventListener('pointerup', e => {
    if (pegs.dragging) { pegs.dragging = false; return; }
    if (!isAiming) return;
    isAiming = false;
    if (isTouch) return; // Touch fires via button
    apparatus.angle = aimAngleCalc(stX(e.clientX), e.clientY, apparatus.x);
    fireCannon();
    apparatus.angle = 0;
});

// Setup Rail Handles
const handleDown = (e) => { if(isHardMode){ e.preventDefault(); pegs.dragging = true; }};
document.getElementById('handleL').addEventListener('pointerdown', handleDown);
document.getElementById('handleR').addEventListener('pointerdown', handleDown);

// Touch Controls
let holdT = null, repT = null;
window.startNudge = (e, dir) => {
    e.preventDefault();
    const step = 0.5 * Math.PI / 180;
    apparatus.angle = clamp(apparatus.angle + dir * step, -MAX_AIM, MAX_AIM);
    holdT = setTimeout(() => {
        let mult = 1;
        repT = setInterval(() => {
            mult = Math.min(mult + 0.2, 6);
            apparatus.angle = clamp(apparatus.angle + dir * step * mult, -MAX_AIM, MAX_AIM);
        }, 28);
    }, 350);
};
window.stopNudge = () => { clearTimeout(holdT); clearInterval(repT); };

// DOM UI
const updateUI = () => {
    document.getElementById('targetDisplay').innerHTML = game.target.split('').map(c=>`<span>${c}</span>`).join('');
    const sCont = document.getElementById('slotsDisplay');
    sCont.innerHTML = Array.from({length: CODE_LENGTH}, (_, i) => {
        const v = game.entered[i] || "";
        const correct = v && v === game.target[i];
        let cName = "slot";
        if (correct) cName += " correct";
        if (i === game.dropped) cName += " active-hover";
        return `<div class="${cName}">${v}</div>`;
    }).join('');
    
    const ready = game.entered.length === CODE_LENGTH && game.entered.every(c => c !== "");
    const btn = document.getElementById('btnSubmit');
    if (ready) btn.classList.add('ready'); else btn.classList.remove('ready');
    
    const touchFire = document.getElementById('btnFireTouch');
    if (game.dropped < CODE_LENGTH) touchFire.classList.add('ready'); else touchFire.classList.remove('ready');
};

window.submitCode = () => {
    if (game.status !== 'playing' || !game.entered.every(c => c !== "")) return;
    const won = game.entered.join('') === game.target;
    game.status = won ? 'success' : 'failure';
    const m = document.getElementById('resultModal');
    document.getElementById('resIcon').innerText = won ? "verified" : "gpp_bad";
    document.getElementById('resIcon').className = won ? "material-icons-round result-icon res-win" : "material-icons-round result-icon res-fail";
    document.getElementById('resTitle').innerText = won ? "Access Granted" : "Access Denied";
    document.getElementById('resSub').innerText = won ? "You successfully bypassed the Plinko firewall." : `You entered ${game.entered.join('')} — the code was ${game.target}.`;
    m.classList.add('open');
};

window.resetGame = () => {
    document.getElementById('resultModal').classList.remove('open');
    initGame();
};

// 8. Main Loop
let lastT = 0, acc = 0;
const loop = (t) => {
    const dt = lastT ? Math.min((t - lastT)/1000, 1/30) : 0;
    lastT = t;
    const playing = game.status === 'playing';

    if (playing) {
        acc += dt;
        while (acc >= FIXED_DT) {
            const py = world.obstacles.length ? world.obstacles[0].center.y : pegs.y;
            stepAll(balls, world, FIXED_DT, py, pegs.y, true, []);
            acc -= FIXED_DT;
        }

        // Project slots
        const newEnt = Array(CODE_LENGTH).fill("");
        for (const b of balls) {
            if (b.resting) {
                const idx = clamp(Math.floor(b.pos.x / world.cupWidth), 0, world.cups.length - 1);
                newEnt[slotOf.get(b)] = world.cups[idx].letter;
            }
        }
        let changed = false;
        for (let i = 0; i < CODE_LENGTH; i++) { if (game.entered[i] !== newEnt[i]) { game.entered[i] = newEnt[i]; changed = true; } }
        const nSlot = nextSlot() ?? CODE_LENGTH;
        if (game.dropped !== nSlot) { game.dropped = nSlot; changed = true; }
        if (changed) updateUI();
    }

    // Render
    const theme = getThemeColor();
    ctx.clearRect(0, 0, world.width, world.height);

    // Glow Prediction
    let glowX = null;
    const blockers = playing ? balls.filter(b=>b.resting).map(b=>({center: v(b.pos.x, b.pos.y), radius: b.radius})) : [];
    if (playing && game.dropped < CODE_LENGTH) {
        const m = muzzlePos(apparatus.x, world.cupWidth, apparatus.angle);
        const vel = launchVel(apparatus.angle);
        const idx = predictLanding(world, m.x, m.y, vel.x, vel.y, blockers);
        if (idx !== null && world.cups[idx].letter === game.target[game.dropped]) {
            glowX = world.cups[idx].centerX;
            const pulse = 0.16 + 0.06 * Math.sin(t/350);
            const grad = ctx.createRadialGradient(glowX, world.height, 0, glowX, world.height, world.domeRadius * 1.3);
            grad.addColorStop(0, `rgba(${theme.glow}, ${pulse})`);
            grad.addColorStop(1, `rgba(${theme.glow}, 0)`);
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(glowX, world.height, world.domeRadius * 1.3, 0, Math.PI * 2); ctx.fill();
        }
    }

    // Domes
    ctx.fillStyle = theme.dome;
    for (const d of world.domes) {
        ctx.beginPath(); ctx.arc(d.center.x, d.center.y, d.radius, Math.PI, 0, false); ctx.fill();
    }

    if (playing) {
        if(isHardMode) {
            // Rail Line
            ctx.strokeStyle = theme.pegLine; ctx.lineWidth = 2; ctx.lineCap = "round"; ctx.setLineDash([0, 8]);
            ctx.beginPath(); ctx.moveTo(0, pegs.y); ctx.lineTo(world.width, pegs.y); ctx.stroke();
            ctx.setLineDash([]); ctx.lineCap = "butt";
            // Pegs
            ctx.fillStyle = theme.dome;
            for (const o of world.obstacles) {
                ctx.beginPath(); ctx.arc(o.center.x, o.center.y, o.radius, 0, Math.PI * 2); ctx.fill();
            }
        }
    }

    // Guideline
    if (playing) {
        const m = muzzlePos(apparatus.x, world.cupWidth, apparatus.angle);
        const vel = launchVel(apparatus.angle);
        const path = predictPath(world, m.x, m.y, vel.x, vel.y, 5, blockers);
        if (path.length >= 2) {
            let dists = [0];
            for (let i = 1; i < path.length; i++) dists[i] = dists[i-1] + len(sub(path[i], path[i-1]));
            const total = dists[path.length - 1];
            if (total > 0) {
                const fadeStart = total * 0.75;
                const march = (t / 1000) * 12;
                ctx.lineWidth = 2; ctx.setLineDash([6, 6]);
                const rgb = glowX !== null ? theme.glow : theme.guideline;
                for (let i = 1; i < path.length; i++) {
                    const mid = (dists[i-1] + dists[i]) / 2;
                    const fade = mid <= fadeStart ? 1 : Math.max(0, 1 - (mid - fadeStart)/(total - fadeStart));
                    ctx.strokeStyle = `rgba(${rgb}, ${0.55 * fade})`;
                    ctx.lineDashOffset = dists[i-1] - march;
                    ctx.beginPath(); ctx.moveTo(path[i-1].x, path[i-1].y); ctx.lineTo(path[i].x, path[i].y); ctx.stroke();
                }
                ctx.setLineDash([]);
            }
        }
    }

    // Letters
    if (playing) {
        ctx.font = "bold 16px Inter, sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        for (const c of world.cups) {
            ctx.fillStyle = c.centerX === glowX ? `rgb(${theme.glow})` : theme.text;
            ctx.fillText(c.letter, c.centerX, world.letterY);
        }
    }

    // Balls
    ctx.fillStyle = theme.ball;
    for (const b of balls) {
        ctx.beginPath(); ctx.arc(b.pos.x, b.pos.y, b.radius, 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = 0;
    }

    // Draw Cannon (over everything)
    const baseRad = world.cupWidth * CANNON_BASE_RATIO;
    const bLen = cannonLength(world.cupWidth);
    const bWid = world.cupWidth * CANNON_WIDTH_RATIO;
    ctx.save();
    ctx.translate(apparatus.x, 0);
    // Base
    ctx.fillStyle = theme.dome;
    ctx.beginPath(); ctx.arc(0, 0, baseRad, 0, Math.PI); ctx.fill();
    // Barrel
    ctx.rotate(apparatus.angle);
    ctx.fillStyle = theme.dome;
    ctx.beginPath();
    ctx.moveTo(-bWid/2, 0); ctx.lineTo(bWid/2, 0); ctx.lineTo(bWid/2, bLen - bWid*0.4);
    ctx.arc(0, bLen - bWid*0.4, bWid/2, 0, Math.PI);
    ctx.lineTo(-bWid/2, 0); ctx.fill();
    ctx.restore();

    requestAnimationFrame(loop);
};

// Start Engine
window.startGameEngine = () => {
    window.addEventListener('resize', window.resizeApp);
    initGame();
    window.resizeApp();
    requestAnimationFrame(loop);
};
</script>
</body>
</html>
