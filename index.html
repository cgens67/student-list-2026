<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta content='width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover' name='viewport'/>
    <meta content='yes' name='apple-mobile-web-app-capable'/>
    <meta content='black-translucent' name='apple-mobile-web-app-status-bar-style'/>
    <title>Student Allocation List 2026</title>
    
    <link href='https://fonts.googleapis.com' rel='preconnect'/>
    <link crossorigin='anonymous' href='https://fonts.gstatic.com' rel='preconnect'/>
    <link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=Noto+Sans+SC:wght@400;500;700&amp;display=swap' rel='stylesheet'/>
    <link href='https://fonts.googleapis.com/icon?family=Material+Icons+Round' rel='stylesheet'/>

    <style>
      :root {
        --ios-bg: #E8F0FE; --ios-card: rgba(255, 255, 255, 0.85); --ios-modal: rgba(255, 255, 255, 0.85);
        --ios-text: #1D1D1F; --ios-text-sec: rgba(29, 29, 31, 0.6); --ios-sep: rgba(0, 0, 0, 0.08);
        --ios-blue: #007AFF; --ios-blue-text: #007AFF; --ios-blue-light: rgba(0, 122, 255, 0.15);
        --ios-input: rgba(255, 255, 255, 0.7);
        --grad-1: #e0c3fc; --grad-2: #8ec5fc; --grad-3: #4facfe;
        --glass-border: rgba(255, 255, 255, 0.8); --glass-highlight: inset 0 1px 1px rgba(255, 255, 255, 0.8);
        --glass-shadow: 0 4px 16px rgba(31, 38, 135, 0.05); --glass-blur: blur(16px) saturate(180%);
        --chip-bg: #FFFFFF; --chip-border: #D1D1D6; --chip-shadow: 0 1px 3px rgba(0,0,0,0.06); --chip-txt: #1D1D1F;
        --chip-act-bg: var(--ios-blue); --chip-act-border: var(--ios-blue); --chip-act-txt: #FFFFFF;
        --shadow-sm: 0 4px 16px rgba(0,0,0,0.04); --shadow-md: 0 8px 24px rgba(0,0,0,0.08); --shadow-lg: 0 16px 48px rgba(0,0,0,0.15);
        --ease-ios: cubic-bezier(0.25, 1, 0.5, 1); --ease-spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
        --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", "Noto Sans SC", sans-serif;
      }
      body.bg-morning:not([data-theme="dark"]) { --grad-1: #ffecd2; --grad-2: #fcb69f; --grad-3: #ff9a9e; }
      body.bg-afternoon:not([data-theme="dark"]) { --grad-1: #a1c4fd; --grad-2: #c2e9fb; --grad-3: #e0c3fc; }
      body.bg-night:not([data-theme="dark"]) { --grad-1: #cfd9df; --grad-2: #e2ebf0; --grad-3: #a1c4fd; }[data-theme="dark"] {
        --ios-bg: #000000; --ios-card: rgba(30, 30, 30, 0.85); --ios-modal: rgba(40, 40, 40, 0.85); 
        --ios-text: #FFFFFF; --ios-text-sec: rgba(255, 255, 255, 0.6); --ios-sep: rgba(255, 255, 255, 0.1);
        --ios-input: rgba(255, 255, 255, 0.15); --grad-1: #0f2027; --grad-2: #203a43; --grad-3: #2c5364; 
        --glass-border: rgba(255, 255, 255, 0.12); --glass-highlight: inset 0 1px 1px rgba(255, 255, 255, 0.15);
        --glass-shadow: 0 4px 16px rgba(0, 0, 0, 0.4); --chip-bg: rgba(255, 255, 255, 0.12);
        --chip-border: rgba(255, 255, 255, 0.15); --chip-shadow: none; --chip-txt: #FFFFFF; --shadow-lg: 0 16px 48px rgba(0,0,0,0.6);
      }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; user-select: none; scrollbar-width: none; -ms-overflow-style: none; }
      ::-webkit-scrollbar { width: 0; height: 0; display: none; }
      body { margin: 0; padding: 0; font-family: var(--font-stack); color: var(--ios-text); background-color: var(--ios-bg); background-image: linear-gradient(135deg, var(--grad-1) 0%, var(--grad-2) 50%, var(--grad-3) 100%); background-attachment: fixed; background-size: cover; -webkit-font-smoothing: antialiased; overflow-x: hidden; min-height: 100vh; transition: background-image 1s ease, background-color 0.4s ease, color 0.4s var(--ease-ios); }
      
      /* --- DOM LOCK HIDING --- */
      #mainAppWrapper { display: none; opacity: 0; transition: opacity 0.5s var(--ease-ios); }
      #mainAppWrapper.visible { display: block; opacity: 1; }

      #ios-container { padding-top: 145px; padding-bottom: 40px; padding-left: 16px; padding-right: 16px; max-width: 800px; margin: 0 auto; }
      @supports (padding-top: env(safe-area-inset-top)) { #ios-container { padding-top: calc(145px + env(safe-area-inset-top)); padding-bottom: calc(40px + env(safe-area-inset-bottom)); } }
      
      /* AUTHENTICATION OVERLAY */
      .auth-overlay { position: fixed; inset: 0; background: var(--ios-bg); background-image: linear-gradient(135deg, var(--grad-1) 0%, var(--grad-2) 50%, var(--grad-3) 100%); z-index: 9999; display: flex; justify-content: center; align-items: center; padding: 20px; opacity: 0; visibility: hidden; pointer-events: none; transition: 0.4s var(--ease-ios); }
      .auth-overlay.active { opacity: 1; visibility: visible; pointer-events: auto; }
      .auth-card { background: var(--ios-card); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); box-shadow: var(--shadow-lg), var(--glass-highlight); border-radius: 24px; padding: 40px 24px; width: 100%; max-width: 360px; position: relative; display: flex; flex-direction: column; align-items: center; text-align: center; overflow: hidden; }
      .auth-dots { position: absolute; top: 16px; right: 16px; color: var(--ios-text-sec); cursor: pointer; padding: 4px; border-radius: 50%; transition: background 0.2s; display: flex; align-items: center; justify-content: center; }
      .auth-dots:active { background: rgba(0,0,0,0.1); transform: scale(0.9); }
      .auth-menu { position: absolute; top: 54px; right: 16px; background: var(--ios-card); backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); box-shadow: var(--shadow-md); border-radius: 12px; overflow: hidden; opacity: 0; visibility: hidden; transform: translateY(-10px); transition: 0.2s var(--ease-spring); z-index: 10; }
      .auth-menu.show { opacity: 1; visibility: visible; transform: translateY(0); }
      .auth-menu-item { padding: 12px 20px; font-size: 14px; font-weight: 500; color: var(--ios-text); cursor: pointer; text-align: left; white-space: nowrap; border-bottom: 1px solid var(--ios-sep); }
      .auth-menu-item:last-child { border-bottom: none; }
      .auth-icon { font-size: 50px; color: var(--ios-blue); margin-bottom: 15px; background: var(--ios-blue-light); border-radius: 50%; padding: 15px; }
      .auth-title { font-size: 24px; font-weight: 800; color: var(--ios-text); margin-bottom: 6px; letter-spacing: -0.02em; }
      .auth-sub { font-size: 14px; color: var(--ios-text-sec); margin-bottom: 24px; line-height: 1.4; }
      .auth-input { width: 100%; height: 50px; border-radius: 12px; border: 1px solid var(--chip-border); background: var(--ios-input); padding: 0 16px; font-size: 16px; color: var(--ios-text); margin-bottom: 12px; outline: none; transition: 0.3s; }
      .auth-input:focus { border-color: var(--ios-blue); box-shadow: 0 0 0 3px var(--ios-blue-light); }
      .auth-btn { width: 100%; height: 50px; border-radius: 12px; background: var(--ios-blue); color: #fff; font-weight: 700; font-size: 16px; border: none; cursor: pointer; transition: 0.2s var(--ease-spring); margin-bottom: 16px; }
      .auth-btn:active { transform: scale(0.96); opacity: 0.9; }
      .auth-switch { color: var(--ios-blue); font-size: 14px; font-weight: 600; cursor: pointer; }
      .auth-error { color: #FF3B30; font-size: 13px; font-weight: 500; margin-bottom: 12px; opacity: 0; transition: 0.3s; width: 100%; text-align: center; display: flex; align-items: center; justify-content: center; gap: 4px; }
      .auth-error.show { opacity: 1; }
      .dialog-btn { width: 100%; height: 44px; border-radius: 10px; background: var(--ios-blue); color: #fff; font-weight: 600; font-size: 15px; border: none; cursor: pointer; transition: 0.2s; margin-top: 20px; }

      /* --- REST OF STYLING --- */
      .ios-header { position: fixed; top: 0; left: 0; right: 0; height: 125px; background: transparent; z-index: 1000; border-bottom: 0.5px solid transparent; padding: 0 16px; display: flex; flex-direction: column; justify-content: flex-end; padding-bottom: 12px; transform: translate3d(0, 0, 0); transition: transform 0.4s var(--ease-ios), background-color 0.4s var(--ease-ios); }
      @supports (backdrop-filter: blur(20px)) { .ios-header { background: rgba(255, 255, 255, 0.75); backdrop-filter: var(--glass-blur); border-bottom: 1px solid var(--glass-border); } }
      .header-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; height: 32px; gap: 12px; }
      .ios-title { font-size: 28px; font-weight: 800; letter-spacing: 0.01em; margin: 0; color: var(--ios-text); height: 62px; display: flex; align-items: flex-end; line-height: 1.1; overflow: hidden; transform-origin: left bottom; }
      .action-row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; }
      .ios-search-field { width: 100%; height: 42px; padding: 0 10px 0 38px; border-radius: 12px; border: 1px solid var(--chip-border); background: var(--ios-input); box-shadow: var(--glass-highlight); color: var(--ios-text); font-size: 17px; }
      .student-grid { display: flex; flex-direction: column; background: var(--ios-card); border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow), var(--glass-highlight); border-radius: 16px; overflow: hidden; min-height: 50px; }
      .ios-cell { padding: 12px 16px; display: flex; align-items: center; gap: 14px; position: relative; cursor: pointer; transition: background-color 0.2s; }
      .ios-cell::after { content: ''; position: absolute; bottom: 0; right: 0; width: calc(100% - 74px); height: 1px; background: var(--ios-sep); }
      .avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: #fff; flex-shrink: 0; }
      .av-Biru { background: #007AFF; } .av-Hijau { background: #34C759; } .av-Kuning { background: #FF9500; } .av-Merah { background: #FF3B30; } .av-Perang { background: #A2845E; } .av-Ungu { background: #AF52DE; }
    </style>
  </head>
  <body>

    <!-- SECURITY SCRIPT -->
    <script>
      document.addEventListener('contextmenu', e => e.preventDefault());
      document.onkeydown = e => { if(e.keyCode == 123 || (e.ctrlKey && e.keyCode == 85)) return false; }
    </script>

    <!-- AUTHENTICATION OVERLAY -->
    <div id="authScreen" class="auth-overlay active">
      <div class="auth-card">
        <div class="auth-dots" onclick="toggleAuthMenu(event)"><span class="material-icons-round">more_vert</span></div>
        <div class="auth-menu" id="authMenu">
            <div class="auth-menu-item" onclick="showAuthDialog('Student List 2026', 'Version 6.1\nSecured by Google Firebase.\n\nAll data is linked to your account.')">About App</div>
            <div class="auth-menu-item" onclick="showAuthDialog('Help & Support', 'Contact school admin if you cannot log in.')">Help & Support</div>
        </div>
        <span class="material-icons-round auth-icon" id="authIcon">lock_outline</span>
        <div class="auth-title" id="authTitle">Welcome Back</div>
        <div class="auth-sub" id="authSub">Log in to view student records</div>
        <div id="authError" class="auth-error"><span class="material-icons-round" style="font-size:16px;">error_outline</span><span id="authErrorText"></span></div>
        <input type="email" id="authEmail" class="auth-input" placeholder="Email Address" />
        <input type="password" id="authPassword" class="auth-input" placeholder="Password" />
        <button class="auth-btn" id="authSubmitBtn">Log In</button>
        <div class="auth-switch" id="authToggleBtn">Don't have an account? Sign Up</div>
      </div>
    </div>

    <!-- IN-UI DIALOG -->
    <div id="authDialogOverlay" class="auth-overlay" style="z-index: 10000; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);">
        <div class="auth-card" style="padding: 30px 24px;">
            <div class="auth-title" id="dialogTitle">Title</div>
            <div class="auth-sub" id="dialogMsg" style="white-space: pre-wrap;">Message</div>
            <button class="dialog-btn" onclick="closeAuthDialog()">Close</button>
        </div>
    </div>

    <!-- MAIN APP WRAPPER -->
    <div id="mainAppWrapper">
        <header class='ios-header'>
          <div class='header-meta'>
             <div class='meta-left'><span class='count-pill' id='studentCount'>0</span></div>
             <div class='header-controls'>
                <button class='theme-toggle' onclick='window.appSignOut()'><span class='material-icons-round' style='color:#FF3B30'>logout</span></button>
                <div class='lang-switch'>
                   <button class='lang-btn active' onclick='switchLanguage("en")'>EN</button>
                   <button class='lang-btn' onclick='switchLanguage("bm")'>BM</button>
                </div>
             </div>
          </div>
          <h1 class='ios-title' id='labelTitle'>Student Allocation<br/>List 2026</h1>
        </header>

        <div id='ios-container'>
          <div class='action-row'>
            <div class='search-box'>
               <span class='material-icons-round search-icon'>search</span>
               <input class='ios-search-field' id='searchInput' placeholder='Search...' type='text'/>
            </div>
          </div>
          <div class='student-grid' id='studentGrid'></div>
        </div>
    </div>

           const cls = s.newClass.split(" ")[1];
           const isFav = window.favorites.includes(s.id);
           return `<div class="ios-cell"><div class="avatar av-${cls}">${s.name[0]}</div><div style="flex:1"><div style="font-weight:600">${s.name}</div><div style="font-size:12px;opacity:0.6">${s.id} • ${s.cn}</div></div>${isFav ? '<span class="material-icons-round" style="color:#FF2D55;font-size:18px">favorite</span>' : ''}</div>`;

      document.getElementById('searchInput').addEventListener('input', filterData);

      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      const eIn = document.getElementById('authEmail'), pIn = document.getElementById('authPassword'), btn = document.getElementById('authSubmitBtn'), tgl = document.getElementById('authToggleBtn');
      const err = document.getElementById('authError'), errT = document.getElementById('authErrorText'), scr = document.getElementById('authScreen'), appW = document.getElementById('mainAppWrapper');

      let isSignUp = false;

      function msg(text) { errT.innerText = text; err.style.opacity = 1; }

      tgl.onclick = () => { 
        isSignUp = !isSignUp; 
        btn.innerText = isSignUp ? "Sign Up" : "Log In"; 
        tgl.innerText = isSignUp ? "Already have an account? Log In" : "Don't have an account? Sign Up";
      };

      btn.onclick = async () => {
        const e = eIn.value.trim(), p = pIn.value.trim();
        if(!e || !p) return msg("Enter details");
        try {
          if(isSignUp) await createUserWithEmailAndPassword(auth, e, p);
          else await signInWithEmailAndPassword(auth, e, p);
        } catch(e) { msg(e.message); }
      };

      onAuthStateChanged(auth, async user => {
        if(user) {
          const dRef = doc(db, "users", user.uid);
          const snap = await getDoc(dRef);
          if(!snap.exists()) await setDoc(dRef, { favorites: [], history: [] });
          else { window.favorites = snap.data().favorites || []; }
          
          scr.classList.remove('active');
          appW.classList.add('visible');
          filterData();
        } else {
          appW.classList.remove('visible');
          scr.classList.add('active');
        }
      });

      window.appSignOut = () => signOut(auth);
    </script>
  </body>
</html>
